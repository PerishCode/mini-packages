name: release-beta

on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/perishcode/mini-packages-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api -> target
          save-if: false

      - name: Test API
        working-directory: api
        run: cargo test --locked

  build:
    needs: test
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Capture build timestamp
        id: build_meta
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./api
          platforms: ${{ matrix.platform }}
          build-args: |
            APP_BUILD_SHA=${{ github.sha }}
            APP_BUILD_TIMESTAMP=${{ steps.build_meta.outputs.timestamp }}
          cache-from: type=gha,scope=mini-packages-api-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=mini-packages-api-${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Stash digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose manifest list (beta + sha tag)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:beta" \
            -t "${IMAGE_NAME}:sha-${{ github.sha }}" \
            $(printf "${IMAGE_NAME}@sha256:%s " *)

      - name: Inspect manifest
        run: docker buildx imagetools inspect "${IMAGE_NAME}:sha-${{ github.sha }}"

      - name: Best-effort public visibility
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api -X PATCH /user/packages/container/mini-packages-api/visibility -f visibility=public || true
